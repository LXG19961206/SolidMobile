<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Solid Component — 组件库文档</title>
    <style>
      html { scrollbar-width: thin; scrollbar-color: transparent transparent; }
      html::-webkit-scrollbar { width: 4px; background: transparent; }
      html::-webkit-scrollbar-track { background: transparent; }
      html::-webkit-scrollbar-thumb { background: transparent; border-radius: 4px; }
      html:hover::-webkit-scrollbar-thumb { background: hsla(0,0%,50%,0.15); }
      html.dark { scrollbar-color: transparent transparent; }
      html.dark::-webkit-scrollbar { background: transparent; }
      html.dark::-webkit-scrollbar-track { background: transparent; }
      html.dark:hover::-webkit-scrollbar-thumb { background: hsla(0,0%,60%,0.08); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
