    <script>
      // 在渲染前读取暗色模式标志，防止闪白
      (function() {
        var isDark = localStorage.getItem('sc-docs-dark-mode') === '1';
        if (!isDark) {
          isDark = new URLSearchParams(location.search).get('dark') === '1';
        }
        if (!isDark) {
          try { isDark = matchMedia('(prefers-color-scheme:dark)').matches; } catch(e) {}
        }
        if (isDark) document.documentElement.classList.add('dark');
      })();
    </script>

      /* 隐藏滚动条但保留滚动 */
